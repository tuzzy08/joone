name: desktop-build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  desktop-bundle:
    name: bundle-${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - ubuntu-22.04
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Verify desktop packaging contracts
        run: npm test -- tests/desktop/desktopPackagingWorkflow.test.ts tests/desktop/desktopScaffold.test.ts tests/desktop/tauriRuntimeBridge.test.ts tests/ui/hitlQueue.test.ts

      - name: Build shared runtime
        run: npm run build

      - name: Compute desktop release metadata
        id: release_meta
        run: npx tsx src/desktop/releaseMetadata.ts

      - name: Build Tauri desktop bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release_meta.outputs.release_tag }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          releaseAssetNamePattern: ${{ steps.release_meta.outputs.release_asset_name_pattern }}
          workflowArtifactNamePattern: ${{ steps.release_meta.outputs.workflow_artifact_name_pattern }}
          uploadWorkflowArtifacts: true

      - name: Validate bundle outputs
        run: npx tsx src/desktop/validateBundles.ts --runner "${{ matrix.platform }}"
