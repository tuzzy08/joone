name: desktop-build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  desktop-bundle:
    name: bundle-${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - ubuntu-22.04
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci --ignore-scripts

      - name: Verify desktop packaging contracts
        run: npm test -- tests/desktop/desktopPackagingWorkflow.test.ts tests/desktop/desktopScaffold.test.ts tests/desktop/tauriRuntimeBridge.test.ts tests/ui/hitlQueue.test.ts

      - name: Build shared runtime
        run: npm run build

      - name: Compute desktop release metadata
        id: release_meta
        run: npx tsx src/desktop/releaseMetadata.ts

      - name: Build Tauri desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ steps.release_meta.outputs.release_tag }}
          releaseName: ${{ steps.release_meta.outputs.release_name }}
          releaseBody: ${{ steps.release_meta.outputs.release_body }}
          assetNamePattern: ${{ steps.release_meta.outputs.asset_name_pattern }}

      - name: Validate bundle outputs
        run: npx tsx src/desktop/validateBundles.ts --runner "${{ matrix.platform }}"

      - name: Smoke test desktop installers
        run: npx tsx src/desktop/smokeTestBundles.ts --runner "${{ matrix.platform }}"

      - name: Publish desktop release assets
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx tsx src/desktop/publishReleaseAssets.ts --runner "${{ matrix.platform }}" --tag "${{ steps.release_meta.outputs.release_tag }}"

      - name: Upload desktop bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_meta.outputs.workflow_artifact_prefix }}-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.dmg
